version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: meusgastos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: CadnunsDev.MeusGastos.Backend/Dockerfile
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=meusgastos;Username=postgres;Password=changeme
      - TokenSecret=ChangeThisTokenSecret
      - PasswordHashSecret=ChangeThisPasswordHashSecret
    ports:
      - "5000:80"
    restart: on-failure

volumes:
  pgdata:
